<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adventure Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">

        <!-- オープニングシーン -->
        <section id="opening-scene" class="scene active">
            <div class="content">
                <h1>冒険の始まり</h1>
                <button onclick="showScene('job-scene')">冒険を始める</button>
            </div>
        </section>

        <!-- 職業選択シーン -->
        <section id="job-scene" class="scene">
            <div class="content">
                <h1>職業を選択してください</h1>
                <button onclick="selectJob('勇者')">勇者</button>
                <button onclick="selectJob('魔法使い')">魔法使い</button>
            </div>
        </section>

        <!-- 精霊選択シーン（これが必要です！） -->
        <section id="spirit-scene" class="scene">
            <div class="content">
                <h1>精霊を選んでください</h1>
                <button onclick="selectSpirit('火の精霊')">火の精霊</button>
                <button onclick="selectSpirit('水の精霊')">水の精霊</button>
            </div>
        </section>

        <!-- 冒険開始シーン -->
        <section id="adventure-scene" class="scene">
            <div class="content">
                <h1>冒険へ出発！</h1>
            </div>
        </section>

    </div>

    <script src="script.js"></script>
</body>
</html>
