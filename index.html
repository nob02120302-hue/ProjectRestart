<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Restart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ナビゲーションメニュー -->
<nav class="top-menu">
    <button onclick="showScreen('homeScreen')">🏠ホーム</button>
    <button onclick="showScreen('questScreen')">📜クエスト</button>
    <button onclick="showScreen('statusScreen')">⚔️ステータス</button>
    <button onclick="showScreen('shopScreen')">🏆ショップ</button>
</nav>

<!-- 各画面 -->
<div id="homeScreen" class="screen">
    <div class="hero-card">
        <h1>ホーム画面</h1>
        <p>ここにメインコンテンツが表示されます。</p>
    </div>
</div>

<div id="questScreen" class="screen hidden">
    <div class="hero-card">
        <h1>クエスト画面</h1>
        <p>準備中...</p>
    </div>
</div>

<div id="statusScreen" class="screen hidden">
    <div class="hero-card">
        <h1>ステータス画面</h1>
        <p>準備中...</p>
    </div>
</div>

<div id="shopScreen" class="screen hidden">
    <div class="hero-card">
        <h1>ショップ画面</h1>
        <p>準備中...</p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
