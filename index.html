<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Quest RPG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <section id="job-scene" class="scene active">
            <h1>Select Job</h1>
            <button onclick="selectJob('Hero')">Hero</button>
        </section>
        <section id="spirit-scene" class="scene">
            <h1>Select Spirit</h1>
            <button onclick="selectSpirit('Fire Spirit')">Fire Spirit</button>
        </section>
        <section id="adventure-scene" class="scene">
            <h1>Start Adventure</h1>
            <button onclick="showScene('dashboard-scene')">Go to Dashboard</button>
        </section>
        <section id="dashboard-scene" class="scene">
            <h1>Dashboard</h1>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
