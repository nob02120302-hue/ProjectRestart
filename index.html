<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Quest RPG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
       <section id="job-scene" class="scene active">
            <h1>職業を選択</h1>
            <button onclick="selectJob('戦士')">タスクバトラー</button>
            <button onclick="selectJob('魔法使い')">ライフクリエイター</button>
            <button onclick="selectJob('盗賊')">スピードランナー</button>
        </section>
        <section id="spirit-scene" class="scene">
            <h1>相棒の精霊を選択</h1>
            <button onclick="selectSpirit('情熱の精霊')">情熱の精霊</button>
            <button onclick="selectSpirit('冷静の精霊')">冷静の精霊</button>
            <button onclick="selectSpirit('軽快の精霊')">軽快の精霊</button>
        </section>
        <section id="adventure-scene" class="scene">
            <h1>冒険を開始</h1>
            <button onclick="showScene('dashboard-scene')">ダッシュボードへ</button>
        </section>
       <section id="dashboard-scene" class="scene">
            <h1>ダッシュボード</h1>
            <div id="status-display">
                <p>職業: <span id="display-job"></span></p>
                <p>相棒: <span id="display-spirit"></span></p>
            </div>
        </section>
    <script src="script.js"></script>
</body>
</html>
