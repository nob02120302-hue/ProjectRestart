<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Project Restart</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<header class="top-card">

<div class="player">

<div class="avatar">
🧙
</div>

<div>

<h2 id="playerName">Player</h2>

<p id="jobName">未選択</p>

</div>

</div>

<div class="level-box">

<p>LEVEL</p>

<h1 id="level">1</h1>

</div>

</header>


<section class="status-card">

<div class="xp-title">

<span>XP</span>

<span id="xpText">0 / 100</span>

</div>

<div class="xpBar">

<div id="xpFill"></div>

</div>

<div class="status-grid">

<div class="status-item">

<h3>💰 Gold</h3>

<p id="gold">0</p>

</div>

<div class="status-item">

<h3>🔥 Restart</h3>

<p id="restart">0</p>

</div>

</div>

</section>


<section class="quest-card">

<h2>

📜 Today's Quest

</h2>

<ul id="questList">

<li>クエスト生成中...</li>

</ul>

<button id="completeBtn">

COMPLETE

</button>

</section>


<nav class="bottom-menu">

<button>🏠</button>

<button>📜</button>

<button>⚔</button>

<button>🎒</button>

<button>🏆</button>

<button>⚙</button>

</nav>

</div>

<script src="script.js"></script>

</body>
</html>
