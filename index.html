<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Project Restart</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="setupScreen" class="screen">

<div class="card">

<h1>🌱 Project Restart</h1>

<p class="sub">
noteを書くことをゲームにしよう。
</p>

<label>ニックネーム</label>

<input
id="name"
type="text"
placeholder="信行">

<label>noteプロフィールURL</label>

<input
id="note"
type="url"
placeholder="https://note.com/">

<button id="startBtn">

START

</button>

</div>

</div>

<div id="homeScreen" class="screen hidden">

<div class="card">

<header>

<h1>🌱 Project Restart</h1>

<p id="welcome"></p>

</header>

<section class="levelCard">

<div class="levelTop">

<span>LEVEL</span>

<h2 id="level">1</h2>

</div>

<div class="xpBar">

<div id="xpFill"></div>

</div>

<p id="xpText">

0 / 100 XP

</p>

</section>

<section class="status">

<div class="box">

<h3>Gold</h3>

<p id="gold">

0

</p>

</div>

<div class="box">

<h3>Restart</h3>

<p id="restart">

0

</p>

</div>

</section>

<section class="quest">

<h2>

Today's note Quest

</h2>

<ul id="questList">

<li>タイトルを決める</li>

<li>500文字書く</li>

<li>公開する</li>

</ul>

<button id="completeBtn">

COMPLETE

</button>

</section>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
