<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Project Restart</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="titleScreen" class="screen">

    <div class="hero-card">

        <h1>🌱 Project Restart</h1>

        <p>noteを書くことをゲームにしよう。</p>

        <button id="beginBtn">
            冒険を始める
        </button>

    </div>

</div>

<div id="jobScreen" class="screen hidden">

    <div class="hero-card">

        <h2>ジョブを選択</h2>

        <div class="job-list">

            <div class="job" data-job="warrior">
                <h3>⚔ 戦士</h3>
                <p>投稿速度UP</p>
            </div>

            <div class="job" data-job="wizard">
                <h3>🧙 賢者</h3>
                <p>XP獲得UP</p>
            </div>

            <div class="job" data-job="bard">
                <h3>🎵 吟遊詩人</h3>
                <p>スキ獲得UP</p>
            </div>

        </div>

        <button id="jobStartBtn">

            このジョブで始める

        </button>

    </div>

</div>

<div id="homeScreen" class="screen hidden">

<div class="app">

<header class="top-card">

<div class="player">

<div class="avatar">
🧙
</div>

<div>

<h2 id="playerName">
Player
</h2>
    
<p id="welcome"></p>
    
<p id="jobName">
未選択
</p>

</div>

</div>

<div class="level-box">

<p>LEVEL</p>

<h1 id="level">
1
</h1>

</div>

</header>

<div class="dashboard">

<div class="left-panel">

<section class="status-card">

<div class="xp-title">
<span>XP</span>
<span id="xpText">0 / 100</span>
</div>

<div class="xpBar">
<div id="xpFill"></div>
</div>

<div class="status-grid">

<div class="status-item">
<h3>💰 Gold</h3>
<p id="gold">0</p>
</div>

<div class="status-item">
<h3>🔥 Restart</h3>
<p id="restart">0</p>
</div>

</div>

</section>

</div>

<div class="center-panel">

<section class="quest-card">

<h2>📜 Today's Quest</h2>

<ul id="questList">
<li>クエスト生成中...</li>
</ul>

<button id="completeBtn">
COMPLETE
</button>

</section>

</div>

<div class="right-panel">

<section class="quest-card">

<h2>📊 統計</h2>

<p>総レベル：<span id="level">1</span></p>
<p>総Gold：<span id="goldStat">0</span></p>
<p>総Restart：<span id="restartStat">0</span></p>

</section>

</div>

</div>
<section class="quest-card">

<h2>

📜 Today's Quest

</h2>

<ul id="questList">

<li>
クエスト生成中...
</li>

</ul>

<button id="completeBtn">

COMPLETE

</button>

</section>

<nav class="bottom-menu">

<button>🏠</button>

<button>📜</button>

<button>⚔️</button>

<button>🎒</button>

<button>🏆</button>

<button>⚙️</button>

</nav>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
