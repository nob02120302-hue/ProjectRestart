<!DOCTYPE html>
<html lang="ja">
<head>
    <style>
        /* RPG風のフレームデザイン */
        .char-panel {
            width: 320px;
            border: 4px solid #5D4037; /* 木目調の濃い茶色 */
            background-color: #EDE0C6; /* 古紙のようなベージュ */
            padding: 10px;
            font-family: 'Courier New', monospace; /* RPGっぽいフォント */
            box-shadow: 5px 5px 0px #3E2723;
        }

        .char-display {
            width: 100%;
            height: 150px;
            background-color: #333; /* ここに背景画像を差し込む */
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .status-text {
            font-size: 18px;
            color: #2E1B0D;
            margin-bottom: 5px;
        }

        .bar-container {
            width: 100%;
            height: 12px;
            background: #A1887F;
            margin-bottom: 8px;
        }

        .bar-hp { width: 90%; height: 100%; background: #E53935; } /* HPバー */
        .bar-mp { width: 70%; height: 100%; background: #1E88E5; } /* MPバー */
    </style>
</head>
<body>

<div class="char-panel">
    <div class="char-display">
        <!-- ここに生成した画像（キャラクター＋背景）を表示 -->
        [キャラクター背景画像エリア]
    </div>
    <div class="status-text">Level 12</div>
    <div class="status-text">EXP: 1,180 / 1,200</div>
    <div>HP</div>
    <div class="bar-container"><div class="bar-hp"></div></div>
    <div>MP</div>
    <div class="bar-container"><div class="bar-mp"></div></div>
</div>

</body>
</html>
