<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Project Restart</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
background:#f4f2eb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

.card{
width:100%;
max-width:430px;
background:#fff;
border-radius:24px;
padding:32px;
box-shadow:0 20px 40px rgba(0,0,0,.08);
}

h1{
font-size:34px;
margin-bottom:10px;
}

p{
color:#777;
margin-bottom:25px;
}

label{
display:block;
margin-top:20px;
font-weight:bold;
}

input{
width:100%;
padding:15px;
margin-top:8px;
border:1px solid #ddd;
border-radius:14px;
font-size:16px;
}

button{
width:100%;
margin-top:30px;
padding:18px;
border:none;
background:#4CAF50;
color:white;
font-size:18px;
border-radius:18px;
cursor:pointer;
transition:.2s;
}

button:hover{
background:#43a047;
}

button:active{
transform:scale(.98);
}
</style>

</head>

<body>

<div class="card">

<h1>🌱 Project Restart</h1>

<p>今日も少しだけ進もう。</p>

<label>ニックネーム</label>

<input
id="name"
placeholder="例：信行">

<label>noteプロフィールURL</label>

<input
id="note"
placeholder="https://note.com/...">

<button onclick="startGame()">

START

</button>

</div>

<script>

function startGame(){

const player={

name:document.getElementById("name").value,

note:document.getElementById("note").value,

level:1,

xp:0,

gold:0,

restart:0

};

localStorage.setItem(

"ProjectRestart",

JSON.stringify(player)

);

alert(player.name+" さん、ようこそ！");

}

</script>

</body>
</html>
