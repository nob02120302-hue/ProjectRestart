<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adventure Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ゲーム全体を覆うコンテナ -->
    <div id="game-container">

        <!-- オープニングシーン -->
        <section id="opening-scene" class="scene active">
            <div class="content">
                <h1>冒険の始まり</h1>
                <p>物語がここから動き出す...</p>
            </div>
        </section>

        <!-- 職業選択シーン -->
     <section id="job-scene" class="scene">
    <div class="content">
        <h1>職業を選択してください</h1>
        <button onclick="selectJob('勇者')">勇者</button>
        <button onclick="selectJob('魔法使い')">魔法使い</button>
    </div>
</section>
            </div>
        </section>

        <!-- 精霊選択シーン -->
        <section id="spirit-scene" class="scene">
            <div class="content">
                <h1>精霊を選んでください</h1>
                <!-- ここに精霊選択ボタンを配置 -->
            </div>
        </section>

        <!-- 冒険開始シーン -->
        <section id="adventure-scene" class="scene">
            <div class="content">
                <h1>冒険へ出発！</h1>
            </div>
        </section>

        <!-- 最終画面（目標画像の状態） -->
        <section id="final-scene" class="scene">
            <div class="content">
                <h1>最終目標画面</h1>
                <!-- ここにあの画像のようなレイアウトを構築 -->
            </div>
        </section>

    </div>

    <script src="script.js"></script>
</body>
</html>
